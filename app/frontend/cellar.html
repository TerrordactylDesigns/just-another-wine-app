<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cellar — Just Another Wine App</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="app-shell">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main">
    <div id="global-alert-banner"></div>

    <div class="page-header">
      <div>
        <div class="eyebrow">Cellar</div>
        <h1 id="cellar-name">Loading…</h1>
        <p id="cellar-location" style="color:var(--color-text-dim);"></p>
      </div>
      <div class="page-actions">
        <button class="btn btn-accent" onclick="document.getElementById('zone-modal').classList.add('open')">+ Add Zone</button>
      </div>
    </div>

    <section class="card-grid" id="zone-list" style="margin-bottom: var(--space-6);"></section>
  </main>
</div>

<div class="modal-overlay" id="zone-modal">
  <div class="modal">
    <div class="modal-header"><h3>Add Zone</h3>
      <button class="dismiss" onclick="document.getElementById('zone-modal').classList.remove('open')" style="background:none;border:none;color:var(--color-text-dim);font-size:18px;">&times;</button>
    </div>
    <label>Zone Name</label>
    <input type="text" id="zone-name-input" placeholder="e.g. Left Rack, Wine Fridge" />
    <label>Target Temp (°F)</label>
    <input type="number" id="zone-temp-input" />
    <label>Target Humidity (%)</label>
    <input type="number" id="zone-humidity-input" />
    <button class="btn btn-primary" onclick="createZone()" style="width:100%;justify-content:center;">Add Zone</button>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/nav.js"></script>
<script src="js/alerts.js"></script>
<script>
renderSidebar(null);
const cellarId = new URLSearchParams(window.location.search).get("id");

async function loadCellar() {
  const cellar = await API.get(`/api/cellars/${cellarId}`);
  document.getElementById("cellar-name").textContent = cellar.name;
  document.getElementById("cellar-location").textContent = cellar.location || "";
}

async function loadZones() {
  const zones = await API.get(`/api/zones?cellar_id=${cellarId}`);
  const el = document.getElementById("zone-list");
  if (zones.length === 0) {
    el.innerHTML = `<div class="empty-state"><h3>No zones yet</h3><p>Add a zone to start tracking bottles, sensors, and cameras.</p></div>`;
    return;
  }
  const cards = await Promise.all(
    zones.map(async (z) => {
      const summary = await API.get(`/api/zones/${z.id}/summary`);
      return `
        <a href="zone.html?id=${z.id}" class="card" style="display:block;color:inherit;">
          <h3>${escapeHtml(z.name)}</h3>
          <div style="display:flex;gap:var(--space-4);margin-top:var(--space-3);font-size:13px;color:var(--color-text-dim);">
            <span>${summary.total_bottles} bottles</span>
            <span>${summary.sensor_count} sensors</span>
            <span>${summary.camera_count} cameras</span>
          </div>
          ${z.target_temp_f ? `<p style="margin-top:var(--space-2);font-size:12px;color:var(--color-text-faint);">Target: ${z.target_temp_f}°F / ${z.target_humidity || "—"}% RH</p>` : ""}
        </a>`;
    })
  );
  el.innerHTML = cards.join("");
}

async function createZone() {
  const name = document.getElementById("zone-name-input").value.trim();
  if (!name) return;
  await API.post("/api/zones", {
    cellar_id: parseInt(cellarId),
    name,
    target_temp_f: parseFloat(document.getElementById("zone-temp-input").value) || null,
    target_humidity: parseFloat(document.getElementById("zone-humidity-input").value) || null,
  });
  document.getElementById("zone-modal").classList.remove("open");
  loadZones();
}

loadCellar();
loadZones();
</script>
</body>
</html>
