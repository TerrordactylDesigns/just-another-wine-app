<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cameras — Just Another Wine App</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="app-shell">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main">
    <div id="global-alert-banner"></div>

    <div class="page-header">
      <div>
        <div class="eyebrow">Monitoring</div>
        <h1>Cameras</h1>
      </div>
      <div class="page-actions">
        <button class="btn btn-accent" onclick="document.getElementById('add-modal').classList.add('open')">+ Add Camera</button>
      </div>
    </div>

    <div class="card-grid" id="camera-cards">
      <p style="color:var(--color-text-dim);">Loading…</p>
    </div>
  </main>
</div>

<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <div class="modal-header"><h3>Add Camera</h3>
      <button onclick="document.getElementById('add-modal').classList.remove('open')" style="background:none;border:none;color:var(--color-text-dim);font-size:18px;">&times;</button>
    </div>
    <label>Name</label><input type="text" id="c-name" />
    <label>Zone</label><select id="c-zone"></select>
    <label>Stream Type</label>
    <select id="c-type">
      <option value="rtsp">RTSP</option>
      <option value="hls">HLS</option>
      <option value="snapshot">Snapshot URL</option>
      <option value="mjpeg">MJPEG</option>
      <option value="webrtc">WebRTC</option>
    </select>
    <label>Stream / Snapshot URL</label><input type="text" id="c-url" placeholder="rtsp://… or https://…" />
    <label>Username (optional)</label><input type="text" id="c-username" />
    <label>Password (optional)</label><input type="password" id="c-password" />
    <button class="btn btn-primary" style="width:100%;justify-content:center;" onclick="createCamera()">Add Camera</button>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/nav.js"></script>
<script src="js/alerts.js"></script>
<script>
renderSidebar("cameras");

async function loadModalOptions() {
  const zones = await API.get("/api/zones");
  document.getElementById("c-zone").innerHTML = zones.map((z) => `<option value="${z.id}">${escapeHtml(z.name)}</option>`).join("");
}

async function createCamera() {
  const type = document.getElementById("c-type").value;
  const url = document.getElementById("c-url").value;
  const payload = {
    name: document.getElementById("c-name").value,
    zone_id: parseInt(document.getElementById("c-zone").value),
    stream_type: type,
    username: document.getElementById("c-username").value,
    password: document.getElementById("c-password").value,
    enabled: true,
  };
  if (type === "snapshot") payload.snapshot_url = url;
  else payload.stream_url = url;

  await API.post("/api/cameras", payload);
  document.getElementById("add-modal").classList.remove("open");
  loadCameras();
}

async function loadCameras() {
  const cameras = await API.get("/api/cameras");
  const zones = await API.get("/api/zones");
  const el = document.getElementById("camera-cards");

  if (cameras.length === 0) {
    el.innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><h3>No cameras yet</h3><p>Add a camera to view live feeds inside a zone.</p></div>`;
    return;
  }

  el.innerHTML = cameras
    .map((c) => {
      const zone = zones.find((z) => z.id === c.zone_id);
      return `
      <div class="card">
        <div style="background:var(--color-bg);border-radius:8px;height:120px;margin-bottom:var(--space-3);overflow:hidden;">
          <img src="${API.base}/api/cameras/${c.id}/snapshot" style="width:100%;height:100%;object-fit:cover;" onerror="this.style.display='none'" />
        </div>
        <h3>${escapeHtml(c.name)}</h3>
        <p style="font-size:13px;color:var(--color-text-dim);margin-top:4px;">${zone ? escapeHtml(zone.name) : "—"} · ${c.stream_type.toUpperCase()}</p>
        <p style="margin-top:var(--space-2);">${c.enabled ? '<span class="badge ready">Enabled</span>' : '<span class="badge past_peak">Disabled</span>'}</p>
        <div style="display:flex;gap:8px;margin-top:var(--space-3);">
          <a class="btn btn-sm" href="camera-detail.html?id=${c.id}">View Live</a>
          <button class="btn btn-sm" onclick="toggleCamera(${c.id}, ${!c.enabled})">${c.enabled ? "Disable" : "Enable"}</button>
        </div>
      </div>`;
    })
    .join("");
}

async function toggleCamera(id, newState) {
  const camera = await API.get(`/api/cameras/${id}`);
  await API.put(`/api/cameras/${id}`, { ...camera, enabled: newState, zone_id: camera.zone_id, name: camera.name, stream_type: camera.stream_type });
  loadCameras();
}

loadModalOptions();
loadCameras();
</script>
</body>
</html>
