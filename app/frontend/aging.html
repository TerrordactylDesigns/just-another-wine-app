<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Currently Aging — Just Another Wine App</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="app-shell">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main">
    <div id="global-alert-banner"></div>

    <div class="page-header">
      <div>
        <div class="eyebrow">Wines</div>
        <h1>Currently Aging</h1>
        <p style="color:var(--color-text-dim);">Wines waiting to reach their drinking window, soonest first.</p>
      </div>
      <div class="page-actions">
        <select id="zone-filter" onchange="loadWines()" style="width:200px;margin-bottom:0;">
          <option value="">All zones</option>
        </select>
      </div>
    </div>

    <div class="card" id="wine-table-wrap">
      <table>
        <thead>
          <tr><th></th><th>Producer</th><th>Wine</th><th>Vintage</th><th>Ready In</th><th>Ready Date</th><th></th></tr>
        </thead>
        <tbody id="wine-tbody">
          <tr><td colspan="7" style="color:var(--color-text-dim);">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<script src="js/api.js"></script>
<script src="js/nav.js"></script>
<script src="js/alerts.js"></script>
<script>
renderSidebar("aging");

async function loadZoneOptions() {
  const zones = await API.get("/api/zones");
  const sel = document.getElementById("zone-filter");
  zones.forEach((z) => {
    const opt = document.createElement("option");
    opt.value = z.id;
    opt.textContent = z.name;
    sel.appendChild(opt);
  });
}

function timeUntil(year) {
  const now = new Date();
  const target = new Date(year, 0, 1);
  const months = Math.max(0, Math.round((target - now) / (1000 * 60 * 60 * 24 * 30)));
  const y = Math.floor(months / 12);
  const m = months % 12;
  if (y === 0) return `${m} month${m !== 1 ? "s" : ""}`;
  return `${y} year${y !== 1 ? "s" : ""}${m > 0 ? " " + m + " mo" : ""}`;
}

async function loadWines() {
  const zoneId = document.getElementById("zone-filter").value;
  let url = "/api/wines?status=aging";
  if (zoneId) url += `&zone_id=${zoneId}`;
  const wines = await API.get(url);
  wines.sort((a, b) => (a.drink_from || 9999) - (b.drink_from || 9999));

  const tbody = document.getElementById("wine-tbody");
  if (wines.length === 0) {
    tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><h3>Nothing aging right now</h3><p>Wines you add with a future drinking window will appear here.</p></div></td></tr>`;
    return;
  }

  const rows = await Promise.all(
    wines.map(async (w) => {
      let primaryImg = null;
      try {
        const imgs = await API.get(`/api/wines/${w.id}/images`);
        primaryImg = imgs.find((i) => i.is_primary) || imgs[0];
      } catch (_) {}
      return `
        <tr>
          <td>${primaryImg ? `<img class="wine-thumb" src="${API.imageUrl(primaryImg.id, true)}" />` : `<div class="wine-thumb-placeholder"></div>`}</td>
          <td><a href="detail.html?id=${w.id}">${escapeHtml(w.producer)}</a></td>
          <td>${escapeHtml(w.name)}</td>
          <td>${w.vintage || "—"}</td>
          <td>${w.drink_from ? timeUntil(w.drink_from) : "—"}</td>
          <td>${w.drink_from || "—"}</td>
          <td>${w.external_url ? `<a class="external-link-icon" href="${escapeHtml(w.external_url)}" target="_blank">↗</a>` : ""}</td>
        </tr>`;
    })
  );
  tbody.innerHTML = rows.join("");
}

loadZoneOptions();
loadWines();
</script>
</body>
</html>
